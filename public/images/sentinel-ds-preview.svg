<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid slice">
  <!-- Page bg -->
  <rect width="800" height="800" fill="#0B0F17"/>

  <!-- Subtle grid -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="0" y1="600" x2="800" y2="600"/>
    <line x1="0" y1="700" x2="800" y2="700"/>
    <line x1="100" y1="0" x2="100" y2="800"/>
    <line x1="200" y1="0" x2="200" y2="800"/>
    <line x1="600" y1="0" x2="600" y2="800"/>
    <line x1="700" y1="0" x2="700" y2="800"/>
  </g>

  <!-- Header band -->
  <rect x="40" y="60" width="720" height="84" fill="#121826" stroke="rgba(255,255,255,0.06)"/>
  <!-- Shield icon tile -->
  <rect x="60" y="80" width="44" height="44" fill="rgba(61,214,140,0.15)"/>
  <path d="M82 92 L96 99 L96 110 C96 116 90 121 82 124 C74 121 68 116 68 110 L68 99 Z" fill="#3DD68C"/>
  <!-- Header text -->
  <text x="120" y="106" font-family="Oswald, system-ui, sans-serif" font-size="18" font-weight="600" fill="#FFFFFF" letter-spacing="-0.01em">Sentinel DS</text>
  <text x="120" y="126" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#64748B" letter-spacing="0.05em">Enterprise Cybersecurity Design System</text>
  <text x="740" y="118" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#64748B" text-anchor="end" letter-spacing="0.25em">LIVE · COMPONENTS</text>

  <!-- Section label -->
  <text x="60" y="200" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="rgba(255,255,255,0.4)" letter-spacing="0.25em">SEVERITY SCALE — 5 LEVELS</text>

  <!-- 5 severity rows -->
  <!-- Critical -->
  <g transform="translate(40 220)">
    <rect width="720" height="48" fill="#121826"/>
    <circle cx="32" cy="24" r="6" fill="#EF4444"/>
    <text x="56" y="29" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">Critical</text>
    <rect x="540" y="20" width="160" height="8" fill="rgba(239,68,68,0.15)"/>
    <rect x="540" y="20" width="160" height="8" fill="#EF4444"/>
  </g>
  <!-- High -->
  <g transform="translate(40 280)">
    <rect width="720" height="48" fill="#121826"/>
    <circle cx="32" cy="24" r="6" fill="#F5B14A"/>
    <text x="56" y="29" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">High</text>
    <rect x="540" y="20" width="160" height="8" fill="rgba(245,177,74,0.15)"/>
    <rect x="540" y="20" width="128" height="8" fill="#F5B14A"/>
  </g>
  <!-- Medium -->
  <g transform="translate(40 340)">
    <rect width="720" height="48" fill="#121826"/>
    <circle cx="32" cy="24" r="6" fill="#FACC15"/>
    <text x="56" y="29" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">Medium</text>
    <rect x="540" y="20" width="160" height="8" fill="rgba(250,204,21,0.15)"/>
    <rect x="540" y="20" width="96" height="8" fill="#FACC15"/>
  </g>
  <!-- Low -->
  <g transform="translate(40 400)">
    <rect width="720" height="48" fill="#121826"/>
    <circle cx="32" cy="24" r="6" fill="#3B82F6"/>
    <text x="56" y="29" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">Low</text>
    <rect x="540" y="20" width="160" height="8" fill="rgba(59,130,246,0.15)"/>
    <rect x="540" y="20" width="64" height="8" fill="#3B82F6"/>
  </g>
  <!-- Info -->
  <g transform="translate(40 460)">
    <rect width="720" height="48" fill="#121826"/>
    <circle cx="32" cy="24" r="6" fill="#3DD68C"/>
    <text x="56" y="29" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">Info</text>
    <rect x="540" y="20" width="160" height="8" fill="rgba(61,214,140,0.15)"/>
    <rect x="540" y="20" width="32" height="8" fill="#3DD68C"/>
  </g>

  <!-- SOC Alert card -->
  <g transform="translate(40 540)">
    <rect width="720" height="80" fill="rgba(239,68,68,0.10)" stroke="rgba(239,68,68,0.40)"/>
    <circle cx="24" cy="34" r="4" fill="#EF4444"/>
    <text x="40" y="34" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#EF4444" font-weight="700" letter-spacing="0.15em">CRITICAL · SOC ALERT</text>
    <text x="40" y="58" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#FFFFFF">Unauthorized root access detected · node-07</text>
  </g>

  <!-- Footer stats strip -->
  <rect x="40" y="660" width="720" height="84" fill="#121826" stroke="rgba(255,255,255,0.05)"/>
  <g font-family="Oswald, system-ui, sans-serif" fill="#FFFFFF" font-weight="700">
    <text x="80" y="706" font-size="28">15+</text>
    <text x="260" y="706" font-size="28">80+</text>
    <text x="440" y="706" font-size="28">2</text>
    <text x="620" y="706" font-size="28">AA</text>
  </g>
  <g font-family="ui-monospace, Menlo, monospace" font-size="10" fill="rgba(255,255,255,0.40)" letter-spacing="0.25em">
    <text x="80" y="728">COMPONENTS</text>
    <text x="260" y="728">TOKENS</text>
    <text x="440" y="728">THEMES</text>
    <text x="620" y="728">A11Y</text>
  </g>
</svg>
